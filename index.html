<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Force | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">Computer Force</div>

    <section class="cta">

    <main>
        <h1>Featured Categories</h1>
        <section class="grid">
            <a class="card" href="products.html#desktop-computers">

            </a>

            <a class="card" href="products.html#laptops-notebooks">
                <img src="images/laptops-notebooks.jpg" alt="Laptops and notebooks category">

            </a>

            <a class="card" href="products.html#tablet">
                <img src="images/tablet.jpg" alt="Tablet category">
                <h2>Tablet</h2>
            </a>

            <a class="card" href="products.html#printing-scanning">
                <img src="images/printers-scanners.jpg" alt="Printing and scanning category">
                <h2>Printing & Scanning</h2>
            </a>

            <a class="card" href="products.html#software">
                <img src="images/software.jpg" alt="Software category">
                <h2>Software</h2>
            </a>

            <a class="card" href="products.html#storages">
                <img src="images/storage.jpg" alt="Storage devices category">
                <h2>Storages</h2>
            </a>

            <a class="card" href="products.html#keyboard-mouse">
                <img src="images/keyboard-mouse.jpg" alt="Keyboard and mouse category">
                <h2>Keyboard/Mouse</h2>
            </a>

    <footer class="footer">
